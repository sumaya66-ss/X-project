<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitter</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>
<body>
  <div class="all">
    <div class="left">
      <a href="#" class="TwitterLogo" >
        <img src="asset/twitter-x-logo-png-9.png" alt="">
      </a>
     
       
      <a href="#" class="link1" >
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>
      <div class="none">
       <a href="#" class="link2" >
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Explore</span>
      </a>
       <a href="#"  class="link2">
       <i class="fa-regular fa-bell"></i>
        <span>Notifications</span>
      </a>
       <a href="#"class="link2">
        <i class="fa-regular fa-envelope"></i>
        <span>Messages</span>
      </a>
       <a href="#" class="link2">
       <i class="fa-brands fa-x-twitter"></i>
        <span>Premium</span>
      </a>
       <a href="#" class="link2">
        <i class="fa-solid fa-list"></i>
        <span>Lists</span>
      </a>
       <a href="#"class="link2" >
        <i class="fa-regular fa-bookmark"></i>
        <span>Bookmarks</span>
      </a>
       <a href="#"class="link2" >
        <i class="fa-solid fa-users"></i>
        <span>Communities</span>
      </a>
       <a href="#"class="link2">
        <i class="fa-solid fa-bolt"></i>
        <span>Verified Orgs</span>
      </a>
       <a href="#"class="link2" >
       <i class="fa-regular fa-user"></i>
        <span>Profile</span>
      </a>
       <a href="#" class="link2">
        <i class="fa-solid fa-ellipsis"></i>
        <span>More</span>
      </a>
      </div>
      <button class="btn1">Post</button>

    </div>
    <hr>
    <div class="middle">

    </div>
    <hr>
    <div class="right">
     
      <div class="src">
        <i class="fa-brands fa-sistrix" ></i>
        <input type="text" placeholder="Search">
      </div>
      
      <div class="follow">
        <h3>Who to follow</h3>
        <div class="profile">
          <img src="asset/cooper.jpg" alt="">
          <div class="info">
            <span class="name">Jane Cooper</span>
            <span class="username">@JCooper</span>
          </div>
          <button>Follow</button>
        </div>

        <div class="profile">
          <img src="asset/fisher.jpg" alt="">
          <div class="info">
            <span class="name">Cady Fisher</span>
            <span class="username">@codyfisher</span>
          </div>
          <button>Follow</button>
        </div>
        <div class="profile">
          <img src="asset/Hawkins.jpg" alt="">
          <div class="info">
            <span class="name">Guy Hawkind</span>
            <span class="username">@GuyJHaekins</span>
          </div>
          <button>Follow</button>
        </div>
        <a href="#" class="show"> Show more</a>

      </div>
    </div>
    <div class="last">
      <h3>Bulgaria trendds</h3>
      <div class="list">
       
        <span class="cate">
          1 . Sports . Trending
        </span>
         <i class="fa-solid fa-ellipsis"></i>
        <h4>Grigor Dimitrov</h4>
        <p>45.2k posts</p>
      </div>
    </div>
  </div>
  
</body>
</html>
